<style>

*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f4faf5,#eef6ef);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;color:var(--text);font-size:16px;line-height:1.62}.app{max-width:560px;margin:0 auto;padding-bottom:32px}.hero{background:linear-gradient(120deg,#f39a24 0%,#2abb72 100%);color:white;padding:18px 18px 26px;position:sticky;top:0;z-index:5;box-shadow:0 4px 16px rgba(0,0,0,.08)}.hero-row{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.title{font-size:18px;font-weight:800;line-height:1.25}.ver{font-size:13px;opacity:.95}.hero-actions{display:flex;flex-direction:column;gap:10px;align-items:flex-end}.topbtn{border:1px solid rgba(255,255,255,.65);background:rgba(255,255,255,.88);color:#2883d5;border-radius:16px;padding:10px 16px;font-weight:800;font-size:15px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05)}.wrap{padding:22px 14px}.club-name{font-size:28px;font-weight:900;margin:0 0 2px}.subtitle{color:var(--muted);font-size:16px;margin-bottom:14px}.summary{background:white;border-radius:22px;padding:18px;margin-bottom:18px;box-shadow:0 8px 22px rgba(24,92,44,.08)}.summary .grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px}.metric{font-size:17px;font-weight:700}.metric b{font-size:20px}.up{color:#138346;font-weight:900}.down{color:var(--red);font-weight:900}.flat{color:#777}.tabs{display:flex;gap:10px;overflow-x:auto;padding:8px 0 14px;scrollbar-width:none;position:sticky;top:97px;z-index:4;background:linear-gradient(180deg,#eef8f0,#eef8f0 80%,rgba(238,248,240,0))}.tabs::-webkit-scrollbar{display:none}.tab{white-space:nowrap;border:1px solid var(--line);background:white;color:#2a7bd1;border-radius:22px;padding:10px 17px;font-weight:800;box-shadow:0 4px 12px rgba(0,0,0,.04)}.tab.active{background:var(--green);color:white;border-color:var(--green)}.card{background:white;border-radius:22px;padding:18px;margin:0 0 16px;box-shadow:0 8px 22px rgba(24,92,44,.08)}h2{font-size:22px;margin:0 0 12px}h3{font-size:18px;margin:16px 0 10px}.notice{background:#eaf7ec;border:1px solid #cdebd2;color:#126b34;border-radius:12px;padding:12px;font-weight:800;margin-bottom:14px}.hint{background:#eef6ff;border:1px solid #c9ddff;color:#274763;border-radius:12px;padding:12px;font-weight:700;margin-bottom:14px}.warn{background:#fff4eb;border:1px solid #ffd8b7;color:#8a4b12;border-radius:12px;padding:12px;font-weight:800}.btn{border:1px solid var(--line);background:white;color:#2b7edb;border-radius:14px;padding:10px 14px;font-weight:800;font-size:15px;margin:4px 4px 4px 0}.btn.main{background:var(--orange);color:white;border-color:var(--orange)}.btn.green{background:var(--green);color:white;border-color:var(--green)}.btn:disabled{opacity:.4}.btn-row{display:flex;flex-wrap:wrap;gap:6px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:8px 4px;text-align:left;vertical-align:top}.table th{color:#51605a;font-size:13px}.pill{display:inline-block;border:1px solid #cfe6d3;background:#effaf1;color:#176b38;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:800}.pill.red{background:#fff0f0;color:#9a3945;border-color:#f2c3ca}.pill.blue{background:#eef6ff;color:#2b66a7;border-color:#cbe0ff}.player,.candidate{border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0;background:#fff}.name{font-weight:900}.small{font-size:13px;color:var(--muted)}.flex{display:flex;justify-content:space-between;gap:12px;align-items:center}.select{width:100%;padding:10px;border-radius:12px;border:1px solid var(--line);background:white;font-weight:700}.kv{display:grid;grid-template-columns:1fr auto;gap:8px;border-bottom:1px solid var(--line);padding:8px 0}.money-plus{color:#158344;font-weight:900}.money-minus{color:#a64250;font-weight:900}.formation{background:linear-gradient(180deg,#dff2e3,#ccebd2);border:1px solid #b8dfc1;border-radius:18px;padding:14px;min-height:270px;position:relative}.lineup-row{display:flex;justify-content:center;gap:8px;margin:12px 0;flex-wrap:wrap}.pos{background:white;border:1px solid #cdebd2;border-radius:14px;padding:7px 9px;text-align:center;min-width:82px;font-size:12px;box-shadow:0 4px 9px rgba(0,0,0,.05)}.pos b{display:block;font-size:13px}.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:20;padding:28px 18px;overflow:auto}.modal{max-width:520px;margin:0 auto;background:white;border-radius:22px;padding:18px;box-shadow:0 18px 45px rgba(0,0,0,.25)}.modal-head{display:flex;justify-content:space-between;align-items:center}.result-section{margin:16px 0}.result-section h3{font-size:16px;margin-bottom:7px}.hidden{display:none}.log-item{border-bottom:1px solid var(--line);padding:9px 0}.contract-alert{color:#b83242;font-weight:900}.category-title{font-size:18px;font-weight:900;margin-top:12px}.seg{display:flex;gap:8px;overflow-x:auto;margin:8px 0 12px}.seg .tab{padding:8px 14px;font-size:14px}.footer-note{font-size:12px;color:var(--muted);padding:10px 4px}@media (max-width:380px){.club-name{font-size:24px}.summary .grid{grid-template-columns:1fr}.tabs{top:93px}.tab{padding:9px 14px}.hero{padding-left:14px;padding-right:14px}}

<body><div id="app" class="app"></div><script>
const VERSION='v0.0.16';
const SAVE_KEY='footballClubBuilderSave_v016';
const teams=['神戸シーガルズ','京都クラシックス','静岡オレンジズ','岐阜フォレスターズ','鹿児島ワーカーズ','長野アルピナ','松本グリーンズ','熊本スピリッツ','金沢ブリッジス','岡山リバーズ','水戸ブルームズ','群馬サンダーズ','栃木マウンツ','鳥取ウインズ','愛媛レモンズ','宮崎サンズ','福島ユナイテッド','奈良ディアーズ','富山ブルーズ'];
const jpSurnames=['松原','成瀬','北','梅田','小鳥遊','九条','相楽','遠宮','城','真壁','滝','桐','田島','早坂','御子柴','三國','坂東','長谷川','若宮','藤堂','瀬戸','小森','高槻'];
const jpNames=['剛','智久','和司','直樹','陸','悠','吾','宗一','誠也','晴翔','朝陽','律','駿','蓮','大地','湊','瑛太','晃平','勇真','蒼'];
const foreignNames=['イヴァン・ロペス','ミラン・バレット','ルーカス・セラーノ','ディエゴ・パレット','マルコ・ラドミル','アレックス・ミラー','キム・ドヒョン','チャナ・スリヤ','ミゲル・アロヨ','ペドロ・ガルシア'];
const positions=['GK','DF','DF','DF','DF','MF','MF','MF','MF','FW','FW'];
const tabs=[['home','ホーム'],['club','クラブ'],['squad','編成'],['tactic','戦術'],['players','選手'],['growth','成長'],['youth','ユース'],['transfer','移籍'],['finance','経営'],['settlement','決算'],['coach','監督'],['facility','施設'],['standings','順位'],['diary','日誌']];
let active='home', transferRegion='jp', transferCat='free';
let state;
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function choice(a){return a[Math.floor(Math.random()*a.length)]}
function fmt(n){return Number(n).toLocaleString('ja-JP')}
function money(n){return fmt(Math.round(n))+'万円'}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function playerName(foreign=false){return foreign?choice(foreignNames):choice(jpSurnames)+' '+choice(jpNames)}
function makePlayer(opts={}){const age=opts.age??rnd(18,36);const foreign=opts.foreign??false;const pos=opts.pos??choice(['GK','DF','MF','FW']);let base=opts.base??rnd(58,72);if(age>32)base+=rnd(-2,4);let pot=Math.max(base+rnd(0,8),opts.potential??0);if(opts.veteranLoan){base=rnd(68,75);pot=Math.max(base,base+rnd(0,2))}return {id:crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random()),name:opts.name??playerName(foreign),age,pos,sub:pos==='DF'?choice(['SB','CB']):pos==='MF'?choice(['DMF','CMF','OMF','SMF']):pos==='FW'?choice(['FW','WG']):'GK',overall:base,potential:pot,wage:opts.wage??Math.max(120,Math.round(base*age/9+rnd(-80,150))),contract:opts.contract??rnd(1,5),foreign,nationality:foreign?choice(['ブラジル','スペイン','韓国','タイ','アルゼンチン','セルビア']):'日本',apps:0,goals:0,assists:0,rating:0,growth:0,role:opts.role??'',skills:makeSkills(pos),starter:false,bench:false,loan:!!opts.loan};}
function makeSkills(pos){const pool=['キャプテンシー','FK','ロングスロー','ドリブル','ロングシュート','タフネス','視野','決定力','守備統率'];let arr=[];if(Math.random()<.22)arr.push(choice(pool));if(Math.random()<.08)arr.push(choice(pool.filter(x=>!arr.includes(x))));return arr;}
function makeInitialPlayers(){let players=[];const foreignCount=rnd(0,2);positions.forEach((p,i)=>players.push(makePlayer({pos:p,base:rnd(62,70),contract:rnd(1,4),foreign:i<foreignCount})));for(let i=0;i<10;i++)players.push(makePlayer({pos:choice(['GK','DF','MF','FW']),base:rnd(56,67),contract:rnd(1,5),foreign:false}));autoLineup(players);return players;}
function autoLineup(players){players.forEach(p=>{p.starter=false;p.bench=false});let sorted=[...players].sort((a,b)=>b.overall-a.overall);sorted.slice(0,11).forEach(p=>p.starter=true);sorted.slice(11,18).forEach(p=>p.bench=true);}
function makeCandidates(){return {jp:{free:[],student:[],active:[],loan:[]},foreign:{free:[],young:[],active:[],loan:[]}}}
function createCandidates(){let c=makeCandidates();for(let i=0;i<7;i++)c.jp.free.push(makeTransferPlayer('jp','free'));for(let i=0;i<5;i++)c.jp.student.push(makeTransferPlayer('jp','student'));for(let i=0;i<5;i++)c.jp.active.push(makeTransferPlayer('jp','active'));for(let i=0;i<5;i++)c.jp.loan.push(makeTransferPlayer('jp','loan'));for(let i=0;i<5;i++)c.foreign.free.push(makeTransferPlayer('foreign','free'));for(let i=0;i<5;i++)c.foreign.young.push(makeTransferPlayer('foreign','young'));for(let i=0;i<5;i++)c.foreign.active.push(makeTransferPlayer('foreign','active'));for(let i=0;i<5;i++)c.foreign.loan.push(makeTransferPlayer('foreign','loan'));return c;}
function transferFeeFor(level,cat,age,overall){if(cat==='free'||cat==='student'||cat==='loan'||cat==='young')return 0;let fee=0;if(level==='J3')fee=rnd(0,1500);else if(level==='J2')fee=rnd(500,6000);else fee=rnd(2000,10000);if(overall>=75)fee+=rnd(1000,6000);if(age>31)fee=Math.round(fee*.45);return fee;}
function makeTransferPlayer(region,cat){let foreign=region==='foreign';if(region==='jp'&&cat==='student')foreign=Math.random()<.05;let age=cat==='student'?choice([18,19,20,21,22]):cat==='young'?rnd(18,22):cat==='loan'&&Math.random()<.28?rnd(32,37):rnd(20,34);let base=cat==='student'?rnd(56,64):cat==='young'?rnd(57,68):cat==='free'?rnd(61,72):cat==='loan'&&age>=32?rnd(68,75):rnd(63,73);let p=makePlayer({foreign,age,base,veteranLoan:cat==='loan'&&age>=32});p.tag=(region==='jp'?'日本':'海外')+'/'+cat;p.transferFee=transferFeeFor(choice(['J3','J2','J1']),cat,age,p.overall);p.signingFee=cat==='free'?rnd(40,250):cat==='student'?rnd(5,60):rnd(80,400);p.loanBurden=cat==='loan'?choice(['年俸負担なし','年俸30％負担','年俸50％負担','年俸全額負担','レンタル料あり']):'';p.scouted=false;p.success=calcSuccess(p,cat);return p;}
function calcSuccess(p,cat){let s=55+(state?Math.min(18,Math.floor(state.supporters/500)):6);if(cat==='loan')s+=12;if(cat==='student')s+=18;if(p.age>32)s+=8;if(p.overall>72)s-=10;return Math.max(12,Math.min(92,s));}
function makeYouth(){const avg=67;let r=Math.random(),pot;if(r<.05)pot=rnd(48,56);else if(r<.55)pot=rnd(58,66);else if(r<.85)pot=rnd(70,74);else if(r<.95)pot=rnd(75,79);else pot=rnd(80,86);let overall=Math.min(pot-rnd(4,15),rnd(45,63));return {id:crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random()),name:playerName(false),age:rnd(15,18),pos:choice(['GK','DF','MF','FW']),sub:choice(['GK','CB','SB','DMF','CMF','OMF','SMF','WG','FW']),overall,potential:pot,registered:false};}
function newGame(){let money=rnd(8000,12000);state={club:'名古屋ファルコンズ',type:'地方育成クラブ',year:2026,month:8,week:1,round:1,phase:'league',rank:rnd(1,8),money,usable:rnd(2000,5000),supporters:rnd(2800,3800),lastMoney:money,lastSupporters:0,players:makeInitialPlayers(),coach:{name:'森原 亮介',age:45,wage:850,contract:2,style:'バランス',attack:66,develop:71,tactics:68},tactic:{formation:'4-4-2 フラット',style:'バランス',subs:'普通',youthUse:'普通'},training:'バランス',facilities:{training:1,youth:1,scout:1,stadium:5000,stadiumWork:0},finance:{annual:rnd(-1000,1500),income:0,expense:0,reserved:0,sponsor:3200,gate:0,goods:0},standings:makeStandings(),diary:[],transfers:null,youthCandidates:[],youthPlayers:[],results:[]};state.transfers=createCandidates();state.youthCandidates=[makeYouth(),makeYouth(),makeYouth(),makeYouth(),makeYouth()];state.diary.push('新シーズンが始まりました。初期資金と年間収支を地方育成クラブ向けに調整済みです。');render();}
function makeStandings(){let arr=[state?.club||'名古屋ファルコンズ',...teams.slice(0,17)].map((t,i)=>({team:t,pts:rnd(0,9),gf:rnd(0,12),ga:rnd(0,10)}));arr.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga));return arr;}
function save(){localStorage.setItem(SAVE_KEY,JSON.stringify(state));alert('保存しました。')}
function load(){let s=localStorage.getItem(SAVE_KEY);if(!s){alert('保存データがありません。');return}state=JSON.parse(s);state.transfers=state.transfers||createCandidates();render();}
function advanceWeeks(n,mode){let summaries=[];let startMoney=state.money;let startRank=state.rank;let startSup=state.supporters;for(let i=0;i<n;i++){summaries.push(playWeek())}let title=mode==='month'?'1か月結果':mode==='phase'?'中断期間までの結果':'試合・週次結果';showResult({title,summary:{weeks:n,startMoney,endMoney:state.money,startRank,endRank:state.rank,startSup,endSup:state.supporters},weeks:summaries});render();}
function advanceToBreak(){let weeks=Math.max(1,4-((state.week-1)%4));advanceWeeks(weeks,'phase')}
function playWeek(){state.lastMoney=state.money;let opponent=choice(teams);let home=Math.random()<.5;let teamPower=avgOverall(state.players.filter(p=>p.starter))+homeAdv(home);let oppPower=rnd(61,71);let gf=Math.max(0,Math.round((teamPower-oppPower)/7+rnd(0,2)));let ga=Math.max(0,Math.round((oppPower-teamPower)/8+rnd(0,2)));if(Math.random()<.22){gf++;ga++}let win=gf>ga, draw=gf===ga;state.rank=Math.max(1,Math.min(18,state.rank+(win?rnd(-2,0):draw?rnd(-1,1):rnd(0,2))));let attendance=rnd(2200,4300)+Math.floor(state.supporters/6)+(home?300:0);let gate=home?Math.round(attendance*.055):0;let goods=home?Math.round(attendance*.018):0;let supporterDelta=win?rnd(35,90):draw?rnd(-10,25):rnd(-55,5);let opCost=Math.round(totalWage()/48)+rnd(25,55);state.money+=gate+goods-opCost;state.supporters=Math.max(1200,state.supporters+supporterDelta);state.usable=Math.max(0,Math.min(state.money-5000,Math.round(state.money*.35)));state.finance.gate+=gate;state.finance.goods+=goods;state.finance.expense+=opCost;let scorers=makeScorers(gf);let training=growPlayers();let ratings=ratePlayers(win,draw);let story=matchStory(home,win,draw,gf,ga);let item={round:state.round,opponent,home,gf,ga,win,draw,attendance,gate,goods,supporterDelta,opCost,scorers,training,ratings,story,beforeMoney:state.lastMoney,afterMoney:state.money};state.results.unshift(item);state.diary.unshift(`第${state.round}節 ${state.club} ${gf}-${ga} ${opponent}。資金${money(state.money)}、サポーター${fmt(state.supporters)}人。`);state.round++;state.week++;if(state.week>4){state.week=1;state.month++;if(state.month>12){state.month=1;state.year++}}return item;}
function homeAdv(home){if(home)return 2.2;return -Math.max(.4,2.2-Math.floor(state.supporters/2000)*.35)}
function avgOverall(arr){return Math.round(arr.reduce((s,p)=>s+p.overall,0)/Math.max(1,arr.length))}
function totalWage(){return state.players.reduce((s,p)=>s+p.wage,0)+(state.coach?.wage||0)}
function makeScorers(gf){let starters=state.players.filter(p=>p.starter);let attackers=starters.filter(p=>p.pos==='FW'||p.pos==='MF');let arr=[];for(let i=0;i<gf;i++){let scorer=choice(attackers.length?attackers:starters), assist=choice(starters.filter(p=>p.id!==scorer.id));scorer.goals++;assist.assists++;arr.push({scorer:scorer.name,assist:assist.name})}return arr;}
function growPlayers(){let notes=[];let factor={バランス:1,若手育成重視:1.25,フィジカル強化:1.05,戦術理解:1.0,コンディション調整:.85}[state.training]||1;state.players.forEach(p=>{let played=p.starter||p.bench&&Math.random()<(state.tactic.subs==='積極的'?.65:state.tactic.subs==='消極的'?.25:state.tactic.subs==='しない'?0:.45);if(played){p.apps++;let bonus=(p.age<=23?0.18:0.05)*(p.starter?1.8:1.15)*factor;if(state.tactic.youthUse==='積極的'&&p.age<=23)bonus+=.08;p.growth+=(bonus+Math.random()*.08);if(p.growth>=1&&p.overall<p.potential){p.overall++;p.growth-=1;notes.push(`${p.name} 総合${p.overall-1}→${p.overall}`)}}else if(p.age<=23){p.growth+=.015}});return notes.length?notes:['大きな変化なし'];}
function ratePlayers(win,draw){let starters=state.players.filter(p=>p.starter);return starters.map(p=>{let r=(win?6.7:draw?6.2:5.8)+(p.pos==='FW'?Math.random()*.8:Math.random()*.5);p.rating=Number(r.toFixed(1));return {pos:p.pos,name:p.name,rating:p.rating}})}
function matchStory(home,win,draw,gf,ga){if(win)return home?'ホームの声援を背に主導権を握り、最後まで集中して勝ち切りました。':'アウェーの難しい空気の中でも粘り強く戦い、少ない好機をものにしました。';if(draw)return '一進一退の展開となり、最後まで勝ち越し点を奪えませんでした。';return home?'ホームで押し込む時間はありましたが、決定力を欠いて勝点を逃しました。':'アウェーで受け身になる時間が長く、終盤にかけて苦しい試合になりました。';}
function showResult(data){const back=document.createElement('div');back.className='modal-back';const weeks=data.weeks||[];let body='';if(weeks.length===1){body=resultHtml(weeks[0])}else{let wins=weeks.filter(w=>w.win).length,draws=weeks.filter(w=>w.draw).length,losses=weeks.length-wins-draws;body+=`<div class="result-section"><h3>期間まとめ</h3><p>${weeks.length}週を進行しました。成績は${wins}勝${draws}分${losses}敗です。</p></div>`;body+=`<div class="kv"><span>順位</span><b>${data.summary.startRank}位 → ${data.summary.endRank}位</b></div>`;body+=`<div class="kv"><span>資金</span><b>${money(data.summary.startMoney)} → ${money(data.summary.endMoney)}</b></div>`;body+=`<div class="kv"><span>サポーター</span><b>${fmt(data.summary.startSup)}人 → ${fmt(data.summary.endSup)}人</b></div>`;body+=weeks.map(w=>`<div class="log-item">第${w.round}節　${state.club} ${w.gf}-${w.ga} ${w.opponent}　${w.home?'ホーム':'アウェー'}</div>`).join('')}
back.innerHTML=`<div class="modal"><div class="modal-head"><h2>${data.title}</h2><button class="btn" onclick="this.closest('.modal-back').remove()">閉じる</button></div>${body}</div>`;document.body.appendChild(back);}
function resultHtml(r){let goals=r.scorers.length?r.scorers.map((g,i)=>`<div>${i+1}点目：${escapeHtml(g.scorer)}（アシスト：${escapeHtml(g.assist)}）</div>`).join(''):'得点なし';let train=r.training.map(x=>`<div>${escapeHtml(x)}</div>`).join('');let ratings=r.ratings.map(x=>`<div>${x.pos} ${escapeHtml(x.name)} ${x.rating}</div>`).join('');return `<div class="result-section"><h3>試合</h3><p>第${r.round}節　${escapeHtml(state.club)} ${r.gf}-${r.ga} ${escapeHtml(r.opponent)}<br>${r.home?'ホーム':'アウェー'} / 相手順位：${rnd(1,18)}位</p></div><div class="result-section"><h3>試合展開</h3><p>${escapeHtml(r.story)}</p></div><div class="result-section"><h3>得点</h3>${goals}</div><div class="result-section"><h3>収入</h3><div>観客数：${fmt(r.attendance)}人</div><div>入場料：${money(r.gate)}</div><div>グッズ：${money(r.goods)}</div></div><div class="result-section"><h3>サポーター</h3><div>${r.supporterDelta>=0?'+':''}${r.supporterDelta}人</div></div><div class="result-section"><h3>トレーニング</h3>${train}</div><div class="result-section"><h3>選手評価</h3>${ratings}</div><div class="result-section"><h3>資金増減内訳</h3><div class="kv"><span>入場料収入</span><b class="money-plus">+${money(r.gate)}</b></div><div class="kv"><span>グッズ収入</span><b class="money-plus">+${money(r.goods)}</b></div><div class="kv"><span>選手・監督・運営費</span><b class="money-minus">-${money(r.opCost)}</b></div><div class="kv"><span>前週資金</span><b>${money(r.beforeMoney)}</b></div><div class="kv"><span>今週資金</span><b>${money(r.afterMoney)}</b></div><div class="kv"><span>増減</span><b>${money(r.afterMoney-r.beforeMoney)}</b></div></div>`}
function signCandidate(region,cat,id){let list=state.transfers[region][cat];let p=list.find(x=>x.id===id);if(!p)return;let cost=(p.transferFee||0)+(p.signingFee||0);if(cat==='loan')cost=p.loanBurden==='レンタル料あり'?rnd(100,500):p.loanBurden==='年俸全額負担'?Math.round(p.wage*.8):p.loanBurden==='年俸50％負担'?Math.round(p.wage*.4):p.loanBurden==='年俸30％負担'?Math.round(p.wage*.25):rnd(0,50);if(state.usable<cost){alert('使用可能資金が足りません。');return}if(Math.random()*100>p.success){alert('交渉はまとまりませんでした。2〜3か月後に印象が回復します。');p.failedWeek=state.round;return}state.money-=cost;state.usable=Math.max(0,state.usable-cost);p.contract=cat==='loan'?1:Math.min(5,p.contract||rnd(2,5));p.loan=cat==='loan';state.players.push(p);list.splice(list.indexOf(p),1);state.diary.unshift(`${p.name}を${cat==='loan'?'レンタル':'獲得'}しました。負担：${money(cost)}。`);alert('交渉成立しました。');render();}
function joinYouth(id){let y=state.youthCandidates.find(x=>x.id===id);if(!y)return;state.youthPlayers.push(y);state.youthCandidates=state.youthCandidates.filter(x=>x.id!==id);state.diary.unshift(`${y.name}がユースに加入しました。`);render();}
function registerYouth(id){let y=state.youthPlayers.find(x=>x.id===id);if(y){y.registered=true;state.diary.unshift(`${y.name}を2種登録しました。`);render();}}
function promoteYouth(id){let y=state.youthPlayers.find(x=>x.id===id);if(!y)return;let p=makePlayer({name:y.name,age:y.age,pos:y.pos,base:y.overall,potential:y.potential,wage:rnd(120,260),contract:y.age<18?3:5});state.players.push(p);state.youthPlayers=state.youthPlayers.filter(x=>x.id!==id);state.diary.unshift(`${y.name}をトップ昇格させました。`);render();}
function renewContract(id,years){let p=state.players.find(x=>x.id===id);if(!p)return;let max=p.age<18?3:5;p.contract=Math.min(max,Number(years));p.wage=Math.round(p.wage*(1+(years-1)*.05));state.diary.unshift(`${p.name}と${p.contract}年契約に更新しました。`);render();}
function upgradeFacility(kind){let costs={training:1200,youth:1000,scout:900,stadium:2500};let cost=costs[kind];if(state.usable<cost){alert('使用可能資金が足りません。');return}state.money-=cost;state.usable-=cost;if(kind==='stadium'){state.facilities.stadiumWork=14;state.finance.reserved+=cost;state.diary.unshift('スタジアム拡張工事を開始しました。完成まで14週です。')}else{state.facilities[kind]++;state.diary.unshift(`${kind==='training'?'練習場':kind==='youth'?'ユース施設':'スカウト網'}を強化しました。`)}render();}
function render(){if(!state)newGame();const app=document.getElementById('app');app.innerHTML=`${renderHero()}<div class="wrap">${renderHeader()}${renderTabs()}${renderTab()}</div>`;}
function renderHero(){return `<div class="hero"><div class="hero-row"><div><div class="title">育成が楽しいサッカークラブ運営ゲーム</div><div class="ver">${VERSION} / ブラウザ試作版</div></div><div class="hero-actions"><div><button class="topbtn" onclick="save()">保存</button> <button class="topbtn" onclick="load()">読込</button></div><button class="topbtn" onclick="if(confirm('新しく始めますか？'))newGame()">新しく始める</button></div></div></div>`}
function renderHeader(){let moneyDiff=state.money-state.lastMoney;return `<h1 class="club-name">${escapeHtml(state.club)}</h1><div class="subtitle">${state.type} / リーグ戦 / ${state.year}年${state.month}月第${state.week}週</div><div class="summary"><div class="grid"><div class="metric">順位 <b>${state.rank}位</b> <span class="${state.rank<=5?'up':'flat'}">${state.rank<=5?'↗':'→'}</span></div><div class="metric">資金 <b>${money(state.money)}</b> <span class="${moneyDiff>=0?'up':'down'}">${moneyDiff>=0?'↑':'↓'}${money(Math.abs(moneyDiff))}</span></div><div class="metric">使用可能 <b>${money(state.usable)}</b></div><div class="metric">サポーター <b>${fmt(state.supporters)}人</b> <span class="${state.lastSupporters>=0?'up':'down'}">${state.lastSupporters>=0?'↑':'↓'}${Math.abs(state.lastSupporters)}人</span></div></div></div>`}
function renderTabs(){return `<div class="tabs">${tabs.map(t=>`<button class="tab ${active===t[0]?'active':''}" onclick="active='${t[0]}';render()">${t[1]}</button>`).join('')}</div>`}
function renderTab(){return ({home:renderHome,club:renderClub,squad:renderSquad,tactic:renderTactic,players:renderPlayers,growth:renderGrowth,youth:renderYouth,transfer:renderTransfer,finance:renderFinance,settlement:renderSettlement,coach:renderCoach,facility:renderFacility,standings:renderStandings,diary:renderDiary}[active]||renderHome)()}
function renderHome(){let next=choice(teams);return `<div class="notice">リーグ戦中です。開幕直後4節までは登録可能期間です。</div><div class="card"><h2>次の行動</h2><p><b>第${state.round}節：</b><br>${state.club} vs ${next}（現在${rnd(1,18)}位）</p><div class="btn-row"><button class="btn main" onclick="advanceWeeks(1,'week')">1週間進める</button><button class="btn" onclick="advanceWeeks(4,'month')">1か月進める（4週）</button><button class="btn" onclick="advanceToBreak()">次の中断期間まで進める</button></div></div><div class="card"><h2>重要情報</h2><div class="kv"><span>今季使用可能資金</span><b>${money(state.usable)}</b></div><div class="kv"><span>年間収支見込</span><b class="${state.finance.annual>=0?'money-plus':'money-minus'}">${state.finance.annual>=0?'+':''}${money(state.finance.annual)}</b></div><div class="kv"><span>期末現金見込</span><b>${money(state.money+state.finance.annual)}</b></div><div class="kv"><span>次の注意</span><b>${contractAlerts().length?'契約更新対象あり':'スタジアム工事中 残'+state.facilities.stadiumWork+'週'}</b></div></div><div class="card"><h2>直近の出来事</h2>${state.results[0]?resultHtml(state.results[0]):'<p>まだ試合結果はありません。</p>'}</div>`}
function renderClub(){return `<div class="card"><h2>クラブ</h2><div class="kv"><span>クラブ名</span><b>${escapeHtml(state.club)}</b></div><div class="kv"><span>方針</span><b>${state.type}</b></div><div class="kv"><span>クラブ格</span><b>日本3部・地方育成</b></div><div class="kv"><span>サポーター</span><b>${fmt(state.supporters)}人</b></div><div class="kv"><span>外国籍選手</span><b>${state.players.filter(p=>p.foreign).length}人</b></div><p class="small">J3開始時は外国籍0〜2人中心。提携国枠は将来拡張しやすい土台として扱います。</p></div>`}
function renderSquad(){let starters=state.players.filter(p=>p.starter);let rows=[starters.slice(9,11),starters.slice(5,9),starters.slice(1,5),starters.slice(0,1)];return `<div class="card"><h2>編成</h2><div class="hint">おすすめ編成はボタンを押した時だけ変更します。手動入れ替えやドラッグ＆ドロップは今後の候補です。</div><button class="btn green" onclick="autoLineup(state.players);render()">実力重視で自動編成</button><div class="formation">${rows.map(row=>`<div class="lineup-row">${row.map(p=>`<div class="pos"><b>${p.pos}</b>${escapeHtml(p.name)}<br>総合${p.overall}</div>`).join('')}</div>`).join('')}</div><h3>ベンチ</h3>${state.players.filter(p=>p.bench).map(p=>`<span class="pill">${p.pos} ${escapeHtml(p.name)} ${p.overall}</span> `).join('')}</div>`}
function renderTactic(){return `<div class="card"><h2>戦術</h2><label>フォーメーション<select class="select" onchange="state.tactic.formation=this.value;render()">${['4-4-2 フラット','4-4-2 ダイヤモンド','4-2-3-1','4-3-3','3-5-2','5-4-1'].map(x=>`<option ${state.tactic.formation===x?'selected':''}>${x}</option>`).join('')}</select></label><br><br><label>戦術<select class="select" onchange="state.tactic.style=this.value;render()">${['バランス','堅守速攻','ポゼッション','ハイプレス','サイド攻撃'].map(x=>`<option ${state.tactic.style===x?'selected':''}>${x}</option>`).join('')}</select></label><br><br><label>交代方針<select class="select" onchange="state.tactic.subs=this.value;render()">${['しない','消極的','普通','積極的'].map(x=>`<option ${state.tactic.subs===x?'selected':''}>${x}</option>`).join('')}</select></label><br><br><label>若手起用方針<select class="select" onchange="state.tactic.youthUse=this.value;render()">${['消極的','普通','積極的'].map(x=>`<option ${state.tactic.youthUse===x?'selected':''}>${x}</option>`).join('')}</select></label><p class="small">交代方針の初期値は「普通」です。若手は1分でも出場すれば未出場より成長補正が入ります。</p></div>`}
function contractAlerts(){return state.players.filter(p=>p.contract<=1)}
function renderPlayers(){return `<div class="card"><h2>選手</h2><h3>契約更新</h3>${state.players.slice().sort((a,b)=>a.contract-b.contract||b.overall-a.overall).map(p=>`<div class="player"><div class="flex"><div><div class="name">${escapeHtml(p.name)} ${p.foreign?'<span class="pill blue">外国籍</span>':''}</div><div>${p.age}歳 / ${p.pos}/${p.sub} / 総合${p.overall} / 素質${p.potential}</div><div class="${p.contract<=1?'contract-alert':'small'}">契約残り：${p.contract}年　年俸：${money(p.wage)}</div><div class="small">スキル：${p.skills.length?p.skills.join('、'):'なし'}</div></div><div><select onchange="renewContract('${p.id}',this.value)" class="select"><option>更新</option>${[1,2,3,4,5].filter(y=>!(p.age<18&&y>3)).map(y=>`<option value="${y}">${y}年</option>`).join('')}</select></div></div></div>`).join('')}</div>`}
function renderGrowth(){let sorted=[...state.players].sort((a,b)=>(b.overall+b.growth)-(a.overall+a.growth));return `<div class="card"><h2>成長・育成</h2><label>今週の育成方針<select class="select" onchange="state.training=this.value;render()">${['バランス','若手育成重視','フィジカル強化','戦術理解','コンディション調整'].map(x=>`<option ${state.training===x?'selected':''}>${x}</option>`).join('')}</select></label><h3>今季成長ランキング</h3>${sorted.slice(0,8).map(p=>`<div class="kv"><span>${p.pos} ${escapeHtml(p.name)}</span><b>総合${p.overall} / 成長蓄積${p.growth.toFixed(2)}</b></div>`).join('')}<h3>スタメン候補に育ってきた若手</h3>${state.players.filter(p=>p.age<=23&&p.overall>=64).slice(0,6).map(p=>`<div class="log-item">${p.name} ${p.age}歳 総合${p.overall} 素質${p.potential}</div>`).join('')||'<p>まだ該当者はいません。</p>'}<h3>低下が目立つ選手</h3>${state.players.filter(p=>p.age>=34).slice(0,5).map(p=>`<div class="log-item">${p.name} ${p.age}歳。ピーク後半のため長期契約は注意。</div>`).join('')||'<p>大きな低下はありません。</p>'}</div>`}
function renderYouth(){return `<div class="card"><h2>ユース</h2><div class="hint">素質分布：平均以下50％、上位リーグ平均くらい30％、さらに上10％、大外れ5％、超レア5％。</div><h3>ユース候補</h3>${state.youthCandidates.map(y=>`<div class="candidate"><div class="name">${escapeHtml(y.name)}</div><div>${y.age}歳 / ${y.pos}/${y.sub} / 総合${y.overall} / 素質${y.potential}</div><button class="btn main" onclick="joinYouth('${y.id}')">ユース加入</button></div>`).join('')}<h3>ユース所属選手</h3>${state.youthPlayers.map(y=>`<div class="candidate"><div class="name">${escapeHtml(y.name)} ${y.registered?'<span class="pill">2種登録</span>':''}</div><div>${y.age}歳 / ${y.pos}/${y.sub} / 総合${y.overall} / 素質${y.potential}</div><button class="btn" onclick="registerYouth('${y.id}')">2種登録</button><button class="btn main" onclick="promoteYouth('${y.id}')">トップ昇格</button></div>`).join('')||'<p>ユース所属選手はいません。</p>'}</div>`}
function renderTransfer(){const region=transferRegion,cat=transferCat;const labels={free:'自由契約',student:'学生',active:'現役',loan:'レンタル',young:'若手'};let cats=region==='jp'?['free','student','active','loan']:['free','young','active','loan'];let list=state.transfers[region][cat]||[];return `<div class="card"><h2>移籍・契約</h2><div class="hint">日本：自由契約・学生・現役・レンタル。海外：自由契約・若手・現役・レンタル。ユースはユースタブで管理します。</div><div class="category-title">地域</div><div class="seg"><button class="tab ${region==='jp'?'active':''}" onclick="transferRegion='jp';transferCat='free';render()">日本</button><button class="tab ${region==='foreign'?'active':''}" onclick="transferRegion='foreign';transferCat='free';render()">海外</button></div><div class="category-title">${region==='jp'?'日本':'海外'}カテゴリ</div><div class="seg">${cats.map(c=>`<button class="tab ${cat===c?'active':''}" onclick="transferCat='${c}';render()">${labels[c]}</button>`).join('')}</div><button class="btn main" onclick="state.transfers=createCandidates();render()">スカウト更新</button><p class="small">日本学生の外国人比率は約5％。レンタルは年俸目安ではなくレンタル負担目安で表示します。</p>${list.map(p=>`<div class="candidate"><div class="flex"><div><div class="name">${escapeHtml(p.name)} ${p.foreign?'<span class="pill blue">外国籍</span>':'<span class="pill">日本</span>'}</div><div>${p.age}歳 / ${p.pos}/${p.sub} / 総合${p.overall} / 素質${p.potential}</div><div class="small">年俸目安：${money(p.wage)} / 契約金：${money(p.signingFee)} / 移籍金：${money(p.transferFee||0)}</div>${p.loanBurden?`<div><b>レンタル負担目安：</b>${p.loanBurden}</div>`:''}<div class="small">成功率目安：${p.success}%</div></div></div><button class="btn main" onclick="signCandidate('${region}','${cat}','${p.id}')">条件提示</button></div>`).join('')}</div>`}
function renderFinance(){let income=state.finance.sponsor+state.finance.gate+state.finance.goods+1800;let expense=totalWage()+state.finance.expense+2600;return `<div class="card"><h2>年間収支見込</h2><div class="kv"><span>年間収支見込</span><b class="${state.finance.annual>=0?'money-plus':'money-minus'}">${state.finance.annual>=0?'+':''}${money(state.finance.annual)}</b></div><div class="kv"><span>スポンサー</span><b>${money(state.finance.sponsor)}</b></div><div class="kv"><span>入場料累計</span><b>${money(state.finance.gate)}</b></div><div class="kv"><span>グッズ累計</span><b>${money(state.finance.goods)}</b></div><div class="kv"><span>人件費目安</span><b>${money(totalWage())}</b></div><div class="kv"><span>予約済み支出</span><b>${money(state.finance.reserved)}</b></div></div><div class="card"><h2>キャッシュフロー見込</h2><div class="kv"><span>現在資金</span><b>${money(state.money)}</b></div><div class="kv"><span>今季使用可能資金</span><b>${money(state.usable)}</b></div><div class="kv"><span>期末現金見込</span><b>${money(state.money+state.finance.annual-state.finance.reserved)}</b></div><p class="small">初期収支は多少の赤字〜多少の黒字に収まるよう調整しています。移籍金収入がないと破綻する前提にはしていません。</p></div>`}
function renderSettlement(){let income=state.finance.sponsor+state.finance.gate+state.finance.goods+1800;let expense=totalWage()+state.finance.expense+2600+state.finance.reserved;return `<div class="card"><h2>決算見込</h2><div class="kv"><span>収入見込</span><b>${money(income)}</b></div><div class="kv"><span>支出見込</span><b>${money(expense)}</b></div><div class="kv"><span>年間損益見込</span><b class="${income-expense>=0?'money-plus':'money-minus'}">${income-expense>=0?'+':''}${money(income-expense)}</b></div><div class="kv"><span>期末現金見込</span><b>${money(state.money+income-expense)}</b></div><h3>内訳</h3><div class="log-item">スポンサー、入場料、グッズ、地域収入を収入に反映。</div><div class="log-item">選手・監督年俸、運営費、施設予約支出を支出に反映。</div></div>`}
function renderCoach(){let c=state.coach;return `<div class="card"><h2>監督</h2><div class="kv"><span>名前</span><b>${c.name}</b></div><div class="kv"><span>年齢</span><b>${c.age}歳</b></div><div class="kv"><span>年俸</span><b>${money(c.wage)}</b></div><div class="kv"><span>契約</span><b>残り${c.contract}年</b></div><div class="kv"><span>得意戦術</span><b>${c.style}</b></div><div class="kv"><span>攻撃</span><b>${c.attack}</b></div><div class="kv"><span>育成</span><b>${c.develop}</b></div><div class="kv"><span>戦術</span><b>${c.tactics}</b></div></div>`}
function renderFacility(){let f=state.facilities;return `<div class="card"><h2>施設</h2><div class="kv"><span>練習場</span><b>Lv.${f.training}</b></div><div class="kv"><span>ユース施設</span><b>Lv.${f.youth}</b></div><div class="kv"><span>スカウト網</span><b>Lv.${f.scout}</b></div><div class="kv"><span>スタジアム</span><b>${fmt(f.stadium)}人</b></div><div class="kv"><span>工事状況</span><b>${f.stadiumWork>0?'残り'+f.stadiumWork+'週':'工事なし'}</b></div><button class="btn" onclick="upgradeFacility('training')">練習場を強化</button><button class="btn" onclick="upgradeFacility('youth')">ユース施設を強化</button><button class="btn" onclick="upgradeFacility('scout')">スカウト網を強化</button><button class="btn main" onclick="upgradeFacility('stadium')">スタジアム拡張計画</button></div>`}
function renderStandings(){let arr=state.standings.map((x,i)=>({...x,rank:i+1}));arr.find(x=>x.team===state.club).rank=state.rank;arr.sort((a,b)=>a.rank-b.rank);return `<div class="card"><h2>順位</h2><table class="table"><tr><th>順位</th><th>クラブ</th><th>勝点</th><th>得失</th></tr>${arr.map(x=>`<tr><td>${x.rank}</td><td>${escapeHtml(x.team)}</td><td>${x.pts}</td><td>${x.gf-x.ga}</td></tr>`).join('')}</table></div>`}
function renderDiary(){return `<div class="card"><h2>日誌</h2>${state.diary.map(x=>`<div class="log-item">${escapeHtml(x)}</div>`).join('')}</div>`}
newGame();
</script></body></html>
